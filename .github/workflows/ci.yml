name: Lint and Content Checks

# This workflow runs on pull requests targeting the main branch.
on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install dependencies
        run: npm ci
      - name: Run repository checks
        run: npm run lint
      - name: Check published article slug renames in this PR
        run: npm run lint:zenn:changes
